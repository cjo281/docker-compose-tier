version: "3.9"

services:

  # -----------------------------
  # BACKEND (Flask API)
  # -----------------------------
  backend:
    build: ./backend               # Build from backend folder
    container_name: backend
    ports:
      - "5000:5000"                # Expose API to host
    environment:
      POSTGRES_HOST: database      # Service name of DB
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis            # Service name of Redis
    depends_on:
      - database
      - redis

  # -----------------------------
  # POSTGRESQL DATABASE
  # -----------------------------
  database:
    image: postgres:15
    container_name: database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data   # Persistent storage
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
        # Automatically runs init.sql on first startup

  # -----------------------------
  # REDIS CACHE
  # -----------------------------
  redis:
    image: redis:alpine
    container_name: redis

  # -----------------------------
  # FRONTEND (NGINX REVERSE PROXY)
  # -----------------------------
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"                    # Expose Nginx to host
    depends_on:
      - backend

# -----------------------------
# VOLUMES
# -----------------------------
volumes:
  db_data:                         # Persistent PostgreSQL storage